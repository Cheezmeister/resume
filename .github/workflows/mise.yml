name: Mise/Typst CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    env:
      MISE_ENV: ci

    steps:
    - uses: actions/checkout@v4
    - name: Cache mise tools
      uses: actions/cache@v4
      with:
        path: ~/.local/share/mise
        key: "mise-${{ runner.os }}-${{ hashFiles('.tool-versions', 'mise.toml') }}"
    - name: Install mise
      uses: jdx/mise-action@v3
      with:
        version: 'latest-stable'
    - name: Install Typst et. al.
      run: mise install
    - name: Build PDF
      run: typst compile luchen-resume.typ
    - name: Build SVG(s)
      run: "typst compile luchen-resume.typ luchen-resume-p{p}.svg"
    - name: Store PDF
      uses: actions/upload-artifact@v4
      with:
        name: luchen-resume.pdf
        path: luchen-resume.pdf

